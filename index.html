<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agence V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <!-- Logo -->
    <div class="nav-logo">
      <span class="logo-text">AGENCE<span class="logo-dot">.</span></span>
    </div>

    <!-- Bouton central -->
    <div class="btn-wrapper">
      <button type="button" class="shiny-cta shiny-cta--compact">
        <span>Démarrer un projet →</span>
      </button>
    </div>

    <!-- Hamburger -->
    <div class="nav-hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

    <div class="menu-overlay" id="menuOverlay" data-open="false">
        <canvas id="menuCanvasPoints"></canvas>

        <div class="menu-lang-box">
            <p class="lang-box-text">
            Vous êtes actuellement en <span class="lang-highlight">Français</span>.<br>
            <span class="lang-subtext">Ce n'est pas la vôtre ? Changez-la ci-dessous.</span>
            </p>
            
            <div class="lang-box-options">
            <a href="#" class="lang-box-btn active">FR</a>
            <span class="lang-box-separator">/</span>
            <a href="#" class="lang-box-btn">EN</a>
            </div>
        </div>

        <div class="menu-hours-box">
            <div class="hours-header">
                <span class="hours-title">Horaires d'ouverture</span>
                <span class="hours-days">Lundi au Samedi : 9h - 18h</span>
            </div>

            <div class="menu-footer-line" style="margin: 15px 0; opacity: 0.5;"></div>

            <div class="status-zone">
                <p id="statusMessage" class="status-text">—</p>
                <p id="statusUrgency" class="urgency-text"></p>
            </div>

            <a href="tel:+33100000000" id="phoneButton" class="phone-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="phone-icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.58bV17.25A2.25 2.25 0 0 0 4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.58M2.25 6.58A2.25 2.25 0 0 1 4.5 4.5h15a2.25 2.25 0 0 1 2.25 2.08M2.25 6.58 11.25 12.75a1.5 1.5 0 0 0 1.5 0l9-6.17M12 18.75V12" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H14m-3.5 3H14m-6.75 16.5h13.5A2.25 2.25 0 0 0 21 18.75V5.25A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25v13.5A2.25 2.25 0 0 0 5.25 21Z" />
                <path d="M9 17a3 3 0 0 0 6 0H9Z"/>
                <path d="M12 14v.01M8 8h.01M16 8h.01M8 11h.01M16 11h.01"/>
                </svg>
                <span id="phoneButtonText">Afficher le numéro de téléphone</span>
            </a>
        </div>

        <ul class="menu-list">
            <li class="menu-item"><a href="#" class="menu-link">Services</a></li>
            <li class="menu-item"><a href="#" class="menu-link">L'équipe</a></li>
            <li class="menu-item"><a href="#" class="menu-link">FAQ</a></li>
            <li class="menu-item"><a href="#" class="menu-link">Contact</a></li>

            <li class="menu-footer-section">
                <div class="menu-footer-line"></div>
                <a href="mailto:hello@agency.fr" class="menu-email">hello@agency.fr</a>
            </li>
        </ul>

        <div class="menu-copyright">
            © Agence <span id="currentYear"></span>. Tous Droits Réservés.
        </div>
    </div>

  <!-- Contenu placeholder -->
  <main class="hero">
    <h1>Bienvenue</h1>
  </main>

  <script src="main.js"></script>
</body>
</html>
